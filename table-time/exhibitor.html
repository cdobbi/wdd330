<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exhibitor - Table Time</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- <link rel="stylesheet" href="styles/styles.css"> Correct path to styles.css -->
</head>

<body>
    <div class="container">
        <h1 class="text-center my-4">Exhibitor Entry</h1>
        <form id="exhibitor-form">
            <div class="form-group">
                <label for="breed">Choose the Breed & Show you're registered for:</label>
                <div id="checkbox-container" class="row">
                    <!-- Checkboxes will be dynamically generated here -->
                </div>
            </div>
            <div class="text-center my-4">
                <button type="button" id="save-entries" class="btn btn-primary">Save Entries</button>
            </div>
        </form>
    </div>
    <footer class="text-center my-4 bg-primary text-white pb-0 mb-0 pt-2 small">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <p>&copy; 2025 Christi Dobbins. All rights reserved.<br>Published on: <span id="publish-date"></span><br>Contact: <a
                        href="mailto:rhinelanderselect@gmail.com" class="text-white">rhinelanderselect@gmail.com</a></p>
            </div>
        </div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const publishDateElement = document.getElementById("publish-date");
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            publishDateElement.textContent = now.toLocaleDateString('en-US', options);
        });
    </script>
    <script src="scripts/exhibitor.js"></script>
</body>

</html>
