<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabbit Show Lineup</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- <link rel="stylesheet" href="style.css"> Ensure this path is correct -->
</head>

<body>
    <div class="container">
        <h1 class="text-center my-4">Rabbit Show Lineup</h1>

        <div class="form-group text-center">
            <label for="category">Choose a Category:</label>
            <select id="category" name="category" class="form-control d-inline-block w-auto mx-2">
                <option value="Youth">Youth</option>
                <option value="Open">Open</option>
            </select>
        </div>
        <div class="form-group text-center">
            <label for="show">Choose a Show:</label>
            <select id="show" name="show" class="form-control d-inline-block w-auto mx-2">
                <option value="A">Show A</option>
                <option value="B">Show B</option>
                <option value="C">Show C</option>
                <option value="D">Show D</option>
                <option value="Meat Pen">Meat Pen</option>
                <option value="Fur">Fur</option>
            </select>
        </div>

        <div id="breed-options" class="row justify-content-center">
            <!-- Breed options will be displayed here -->
        </div>

        <div id="lineup" class="row justify-content-center">
            <!-- Entries will be displayed here -->
        </div>
        <div class="text-center my-4">
            <button id="save-lineup" class="btn btn-primary mx-2">Save Lineup</button>
            <button id="print-lineup" class="btn btn-success mx-2">Print Lineup</button>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="scripts/organizer.js"></script> <!-- Ensure this path is correct -->
    <script src="scripts/lineup.js"></script> <!-- Ensure this path is correct -->

</body>

</html>
