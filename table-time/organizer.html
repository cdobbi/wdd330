<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabbit Show Lineup</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <!-- Ensure this path is correct -->
</head>

<body>
    <div class="container">
        <h1 class="text-center my-4">Rabbit Show Lineup</h1>
        <div class="form-group text-center">
            <label for="show">Choose a Show:</label>
            <select id="show" name="show" class="form-control d-inline-block w-auto mx-2">
                <option value="Show A">Show A</option>
                <option value="Show B">Show B</option>
                <option value="Show C">Show C</option>
                <option value="Show D">Show D</option>
                <option value="Meat Pens">Meat Pens</option>
            </select>
        </div>
        <div id="lineup" class="row justify-content-center">
            <!-- Entries will be displayed here -->
        </div>
        <div class="text-center my-4">
            <button id="save-lineup" class="btn btn-primary mx-2">Save Lineup</button>
            <button id="modify-lineup" class="btn btn-fourth mx-2">Modify Lineup</button>
            <button id="clear-lineup" class="btn btn-secondary mx-2">Clear Lineup</button>
            <button id="print-lineup" class="btn btn-tertiary mx-2">Print Lineup</button>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="scripts/organizer.js"></script> <!-- Ensure this path is correct -->
</body>

</html>
